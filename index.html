<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDV Hesaplama</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    min-height:100vh;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,
select,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:15px;
    text-align:center;
    background:#fff;
}

input:focus,
select:focus{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.main-btn{
    flex:1;
    font-weight:600;
}

.reset-btn{
    width:46px;
    min-width:46px;
}

button.clicked-blue{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn.active-reset{
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.highlight{
    float:right;
    font-weight:700;
}

/* 🔻 FOOTER SABİT EN ALT */
.footer{
    position:fixed;
    bottom:8px;
    left:0;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>KDV Dahil Fiyat</label>
<input id="kdvDahil" type="text" inputmode="decimal">
</div>

<div class="input-group">
<label>KDV %</label>
<select id="kdv">
<option value="1">%1</option>
<option value="10">%10</option>
<option value="20">%20</option>
</select>
</div>

<div class="button-row">
<button id="hesaplaBtn" class="main-btn" onclick="hesapla()">Hesapla</button>
<button class="reset-btn" onclick="sifirla(event)">↺</button>
</div>

<div class="result" id="sonuc">
<p><b>KDV Tutarı</b> <span id="kdvTutar" class="highlight"></span></p>
<p><b>KDV Hariç</b> <span id="haric" class="highlight"></span></p>
</div>

</div>

<!-- 🔻 EN ALTTA SABİT -->
<div class="footer">
Created by Fatih Mersin
</div>

<script>

function g(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

function hesapla(){

    let dahil=g("kdvDahil");
    let kdv=parseFloat(document.getElementById("kdv").value);

    let haric=dahil/(1+kdv/100);
    let kdvTutar=dahil-haric;

    document.getElementById("kdvTutar").innerText=kdvTutar.toFixed(2);
    document.getElementById("haric").innerText=haric.toFixed(2);

    document.getElementById("sonuc").style.display="block";
}

function sifirla(e){
    e.preventDefault();

    document.getElementById("kdvDahil").value="";
    document.getElementById("sonuc").style.display="none";
}

</script>

</body>
</html>
