<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDV Hariç Hesaplama</title>

<link rel="icon" type="image/png" sizes="512x512" href="tag-512.png">
<link rel="apple-touch-icon" href="tag-512.png">

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,
select,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:15px;
    text-align:center;
    background:#fff;
    font-weight:400;
    transition:.15s;
}

input:focus,
select:focus{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.main-btn{
    flex:1;
    background:#fff;
    color:#2c3e50;
    font-weight:600;
    cursor:pointer;
    border:1.5px solid #c9d2dc;
    transition:.15s;
}

.main-btn:hover{
    background:#f6f8fa;
}

.main-btn:focus,
.main-btn:active{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

button.clicked-blue{
    border-color:#8fd4ae !important;
    box-shadow:0 0 0 4px rgba(143,212,174,0.45) !important;
}

.reset-btn{
    width:46px;
    min-width:46px;
    background:#fff;
    color:#2c3e50;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.15s;
}

.reset-btn:hover{
    background:#f6f8fa;
}

.reset-btn:focus,
.reset-btn:active,
.reset-btn.active-reset{
    outline:none;
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.clear-btn{
    width:40px;
    height:46px;
    min-width:40px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.clear-btn:hover{
    background:#2587ca;
}

.gray-bg{
    background:#f2f4f7 !important;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.result{
    display:none;
    margin-top:20px;
    background:#f7fbf9;
    padding:15px;
    border-radius:10px;
}

.result p{
    margin:8px 0;
    font-size:15px;
    color:#3d4f66;
}

.highlight{
    float:right;
    font-weight:700;
    color:#2c3e50;
}

.creator{
    margin-top:22px;
    text-align:center;
    font-size:12px;
    color:#9aa6b2;
    letter-spacing:.4px;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>KDV Dahil Fiyat</label>

<div class="field-container">

<input id="kdvDahil" type="tel">

<div class="clear-btn" onclick="temizle(event,'kdvDahil')">
×
</div>

</div>
</div>

<div class="input-group">
<label>KDV %</label>

<select id="kdv" class="gray-bg">
<option value="1">%1</option>
<option value="10">%10</option>
<option value="20">%20</option>
</select>

</div>

<div class="button-row">

<button id="hesaplaBtn" class="main-btn" onclick="hesapla()">
Hesapla
</button>

<button class="reset-btn" onclick="sifirla(event)">
↺
</button>

</div>

<div class="result" id="sonuc">

<p>
<b>KDV Tutarı</b>
<span id="kdvTutar" class="highlight"></span>
</p>

<p>
<b>KDV Hariç Tutar</b>
<span id="haric" class="highlight"></span>
</p>

</div>

<div class="creator">
Created by Fatih Mersin
</div>

</div>

<script>

function temizle(e,id){

    e.preventDefault();

    document.getElementById(id).value="";

    hesapGecersizYap();

    setTimeout(()=>{

        document.getElementById(id).focus();

    },10);

}

function g(id){

    let v=document.getElementById(id).value.trim();

    if(!v) return 0;

    return parseFloat(
        v.replace(/\./g,"")
         .replace(/,/g,".")
    ) || 0;

}

function hesapla(){

    let btn=document.getElementById("hesaplaBtn");

    btn.classList.add("clicked-blue");

    let dahil = g("kdvDahil");

    let kdv = parseFloat(
        document.getElementById("kdv").value
    );

    let haric = dahil / (1 + (kdv/100));

    let kdvTutar = dahil - haric;

    document.getElementById("haric").innerText =
        haric.toFixed(2);

    document.getElementById("kdvTutar").innerText =
        kdvTutar.toFixed(2);

    document.getElementById("sonuc").style.display="block";

}

function hesapGecersizYap(){

    document.getElementById("sonuc")
        .style.display="none";

    document.getElementById("hesaplaBtn")
        .classList.remove("clicked-blue");

}

document.querySelectorAll("input, select")
.forEach(el=>{

    el.addEventListener("input", ()=>{

        hesapGecersizYap();

        document.querySelector(".reset-btn")
            .classList.remove("active-reset");

    });

    el.addEventListener("change", ()=>{

        hesapGecersizYap();

        document.querySelector(".reset-btn")
            .classList.remove("active-reset");

    });

});

const alanlar = Array.from(
    document.querySelectorAll("input,select")
);

alanlar.forEach((el,i)=>{

    el.addEventListener("keydown",(e)=>{

        if(e.key==="Enter"){

            e.preventDefault();

            document.activeElement.blur();

            let next = alanlar[i+1];

            if(next){

                setTimeout(()=>{

                    next.focus();

                    if(next.tagName==="INPUT"){
                        next.select();
                    }

                },0);

            }else{

                hesapla();

            }

        }

    });

});

function sifirla(e){

    e.preventDefault();

    document.querySelectorAll("input")
        .forEach(i=>i.value="");

    document.querySelectorAll("select")
        .forEach(s=>s.selectedIndex=0);

    document.getElementById("sonuc")
        .style.display="none";

    document.getElementById("hesaplaBtn")
        .classList.remove("clicked-blue");

    let resetBtn = e.currentTarget;

    resetBtn.classList.add("active-reset");

}

</script>

</body>
</html>
